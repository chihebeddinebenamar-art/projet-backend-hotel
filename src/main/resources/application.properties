spring.application.name=projectPfa-hotel
# Fichier local optionnel (secrets Cloudinary) — voir application-local.properties + .gitignore
spring.config.import=optional:classpath:application-local.properties
spring.datasource.url=jdbc:mysql://localhost/bd_pfa_hotel?createDatabaseIfNotExist=true&serverTimezone=UTC&allowPublicKeyRetrieval=true&useSSL=false
# globally_quoted_identifiers désactivé : avec LONGBLOB Hibernate générait du SQL invalide (`photo` `LONGBLOB`).
spring.datasource.username=root
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Cloudinary : ne pas mettre api-key / api-secret ici (risque Git). Utiliser
# application-local.properties (gitignored) ou variables CLOUDINARY_API_KEY / CLOUDINARY_API_SECRET.
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:dvffr6r0p}

# Configuration MySQL pour les requêtes batch
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# Configuration pour l'upload de fichiers (évite l'erreur 413 Request Entity Too Large)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# JWT (HS256 — garder une clé longue en production)
jwt.secret=9f86d081884c7d659a2feaa0c55ad015a3bf4f1b2b0b822cd15d6c15b0f00a08
jwt.expiration-ms=86400000

# Stripe (ne pas commiter la clé secrète — utiliser STRIPE_SECRET_KEY ou application-local.properties)
stripe.secret-key=${STRIPE_SECRET_KEY:}